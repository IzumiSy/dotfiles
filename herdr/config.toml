onboarding = false

[keys]
prefix = "ctrl+z"
new_tab = "prefix+n"
next_tab = "prefix+l"
previous_tab = "prefix+h"
workspace_picker = ["ctrl+w", "prefix+w"]
new_workspace = "ctrl+shift+w"
navigate_workspace_up = ["k", "up"]
navigate_workspace_down = ["j", "down"]

[theme]
name = "vesper"
auto_switch = false

[theme.custom]
panel_bg = "#080d1a"
accent = "#8b87ff"
blue = "#60a5fa"
green = "#34d399"
yellow = "#fbbf24"
red = "#fb7185"

[ui.toast]
delivery = "terminal"

[ui]
show_agent_labels_on_pane_borders = false
sidebar_width = 32
sidebar_min_width = 32
sidebar_max_width = 64
pane_borders = true
pane_gaps = false
agent_panel_sort = "spaces"
